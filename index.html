<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>
    <div class="glass-card" id="main-card">
        <img src="cat.png" alt="Cute Cat" class="hero-image" id="cat-img">
        <h1 id="question">Will you be my Valentine? 🥺</h1>
        <div class="buttons">
            <button class="btn btn-yes" id="yes-btn">Yes</button>
            <button class="btn btn-no" id="no-btn">No</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
